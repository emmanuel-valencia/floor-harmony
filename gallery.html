<!DOCTYPE html>
<html>
<head>
    <title>Gallery Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; padding: 0; background-color: #002229; font-family: 'Playfair Display', serif; color: white; text-align: center">
    <header style="padding: 100px 20px 40px; background: #001a1f; border-bottom: 2px solid #c5a059; position: relative;">
    <a href="index.html" style="position: absolute; top: 20px; left: 20px; color: #c5a059; text-decoration: none; font-size: 14px; letter-spacing: 1px; font-weight: bold;">BACK TO HOME</a>
        <img src="floorharmony_braided_logo.png" alt="Floor Harmony Logo" style="height: 110px !important; width: auto; display: block; margin: 0 auto; filter: drop-shadow(0px 0px 3px rgba(255, 255, 255, 0.9)) drop-shadow(0px 0px 10px rgba(255, 255, 255, 0.4)); transform: scale(1.1);">
    <p style="margin: 15px 0 0; font-size: 0.9rem; color: rgba(255, 255, 255, 0.7); letter-spacing: 6px; text-transform: uppercase;">GALLERY</p>
    </header>
<section style="display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px;">
    <div style="position: relative; overflow: hidden; border-radius: 8px; height: 350px; background: #1a1a1a;">
        <img src="carpet-room-1.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="Floor Harmony Project 1">
    </div>
    <div style="position: relative; overflow: hidden; border-radius: 8px; height: 350px; background: #1a1a1a;">
        <img src="carpet-room-2.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="Floor Harmony Project 2">
    </div>
    <div style="position: relative; overflow: hidden; border-radius: 8px; height: 350px; background: #1a1a1a;">
        <img src="carpet-room-3.jpg" style="width: 100%; height: 100%; object-fit: cover" alt="Floor Harmony Project 3">
   </div>
</section>
</div>
</body>
</html>
