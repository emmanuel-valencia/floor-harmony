<!DOCTYPE html>
<html>
    <head>
        <link href="https//fonts.googleapis.com/css2? family=Cinzel:wght@700&display=swap" rel="stylesheet">
        <title>Floor Harmony</title>
        <style>
            @import url( 'https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
            body {
                background: linear-gradient(135deg, #002d35 0%, #004d5a 100%);
                color: white;
                font-family: 'Montserrat' sans-serif;
                margin: 0;
                text-align: center;
                min-height: 100dvh;
            }


            .logo-text {
                font-family: 'Cinzel' , serif !important;
                font-size: 3.5rem;
                letter-spacing: 25px;
                margin: 20px auto;
                text-transform: uppercase;
                display: block;
            }
            .gold-brand {
                color: #c5a059;
                font-weight: 900;
                padding-right: 10px;
                text-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
            }
            .white-brand{
                color: #ffffff;
                font-weight: 200;
                opacity: 0.95;
            }
            .vibrant-line {
                width: 750px;
                height: 3px;
                margin: 10px auto;
                background: linear-gradient(90deg, transparent, #c5a059, transparent);
                transition: width 0.8s cubic-bezier(0.2, 1, 0.3, 1);
                box-shadow: 0 0 15px rgba(197, 160, 89, 0.8);
                
            }
            .vibrant-line:hover {
                width: 750px;
                background: linear-gradient(90deg, transparent, #c5a059, #ffffff, #c5a059, transparent);
                box-shadow: 0px 0px 20px rgba(255, 0, 0, 0.6);
            }
        * { box-sizing: border-box; max-width: 100%;}
            p {
                font-size: 1rem;
                font-weight: 300;
                letter-spacing: 5px;
                color: #888;
                margin: 0;
                text-transform: uppercase;
            }
            input, textarea, select {
                font-size: 16px !important;
            }
        </style>
    </head>
    <body>
     <h1 class="logo-text" style="text-align: center; margin: 0 auto; max-width: 900px; padding-top: 40px;">
            <span class="gold-brand">FLOOR</span><span class="white-brand">HARMONY</span>
        </h1>
      <div class="vibrant-line" style="margin: 20px auto;"></div>
    <p style="text-align: center;">Streaming Quality Carpets.</p>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr);gap: 20px; max-width: 1200px; margin: 40px auto; padding: 0 20px;">
    <div style="border: 2px solid #ffd700; border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.5);">
    <video autoplay muted loop playsinline style="width: 100%; height: 250px; object-fit: cover; display: block;">
    <source src="property_pro.mp4" type="video/mp4">    
    </video>
    <div style="padding: 15px; text-align: center; background: #000; color: #ffd700; font-family: 'Cinzel', serif;">THE PROPERTY PRO</div>
    </div>
    <div style="border: 2px solid #ffd700; border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.5);">
    <video autoplay muted loop playsinline style="width: 100%; height: 250px; object-fit: cover; display: block;">
    <source src="every_dayhome.mp4" type="video/mp4">
    </video>
    <div style="padding: 15px; text-align: center; background: #000; color: #ffd700; font-family:'Cinzel', serif;">THE EVERYDAY HOME</div>
    </div>
    <div style="border: 2px solid #ffd700; border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.5);">
    <video autoplay muted loop playsinline style="width: 100%; height: 250px; object-fit: cover; display: block;">
    <source src="elite_comfort24.mp4" type="video/mp4">
    </video>
    <div style="padding: 15px; text-align: center; background: #000; color: #ffd700; font-family: 'Cinzel', serif;">THE ELITE COMFORT</div>
    </div>
    </div>
    <section id="contact" style="background: rgba(0,0,0,0.6); border: 2px solid #ffd700; border-radius: 20px; padding: 40px; max-width: 800px; margin: 40px auto; box-shadow: 0 0 20px rgba(255,215,0,0.1);">
    <h2 style="font-family: 'Cinzel', serif; color: #ffd700; text-align: center; font-size: 2rem; letter-spacing: 3px; margin-bottom: 30px;">Request A Free Quote</h2>
    <form action="https://formspree.io/f/maqleybw" method="POST" target="hidden_iframe" onsubmit="setTimeout(() => { window.location.href='https://emmanuel-valencia.github.io/floor-harmony/'; }, 1000);">
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
    <input type="text" name="name" placeholder="Your Name" style="width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid #ffd700; color: white; border-radius: 10px; font-size: 16px;" required>  
    <input type="email" name="email" placeholder="Your Email" style="width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid #ffd700; color: white; border-radius: 10px; font-size: 16px;" required>
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone" placeholder="303-913-0327" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #333; border: 1px solid #ffd700; color: white;" required>
    <select name="carpet_type" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #333; border: 1px solid #ffd700; color: white; border-radius: 8px;">
    <option>Select Carpet Type</option><option>Luxury Plush</option><option>Durable Berber</option></select>
    <textarea name="message" placeholder="Tell us about your project..." rows="5" style="width: 100%; padding: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.05); border: 1px solid #ffd700; color: white; border-radius: 8px;"></textarea>
    <button type="submit" onmouseover="this.style.boxShadow= '0 0 20px #ffd700';" onmouseout="this.style.boxShadow= 'none';" style="background: #ffd700; color:black; padding: 18px; border:none; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; width: 100%;">SUBMIT REQUEST</button>
    </form>
    </section>
    </div>
    </body>
    </html>
