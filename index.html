<!DOCTYPE html>
<html>
    <head>
        <link href="https//fonts.googleapis.com/css2? family=Cinzel:wght@700&display=swap" rel="stylesheet">
        <title>Floor Harmony</title>
        <style>
           @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px);}
                to { opacity: 1; transform: translateY (0); }
            }
            .fade-in-box {
                opacity: 0;
                animation: fadeInUp 2.5s ease-out forwards;
            }
            
            @import url( 'https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
            body {
                background: linear-gradient(135deg, #002d35 0%, #004d5a 100%);
                color: white;
                font-family: 'Montserrat' sans-serif;
                margin: 0;
                text-align: center;
                min-height: 100dvh;
            }


            .logo-text {
                font-family: 'Cinzel' , serif !important;
                font-size: 3.5rem;
                letter-spacing: 25px;
                margin: 20px auto;
                text-transform: uppercase;
                display: block;
            }
            .gold-brand {
                color: #c5a059;
                font-weight: 900;
                padding-right: 10px;
                text-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
            }
            .white-brand{
                color: #ffffff;
                font-weight: 200;
                opacity: 0.95;
            }
            .vibrant-line {
                width: 750px;
                height: 3px;
                margin: 10px auto;
                background: linear-gradient(90deg, transparent, #c5a059, transparent);
                transition: width 0.8s cubic-bezier(0.2, 1, 0.3, 1);
                box-shadow: 0 0 15px rgba(197, 160, 89, 0.8);
                
            }
            .vibrant-line:hover {
                width: 750px;
                background: linear-gradient(90deg, transparent, #c5a059, #ffffff, #c5a059, transparent);
                box-shadow: 0px 0px 20px rgba(255, 0, 0, 0.6);
            }
        * { box-sizing: border-box; max-width: 100%;}
            p {
                font-size: 1rem;
                font-weight: 300;
                letter-spacing: 5px;
                color: #888;
                margin: 0;
                text-transform: uppercase;
            }
            input, textarea, select {
                font-size: 16px !important;
            }
             @keyframes LaserStrike {
                0% { width: 0px; opacity: 0; }
                100% { width: 100vw; opacity: 1; }
             }
             @keyframes cinematicIntro {
                0% { opacity: 0; filter: blur(15px); transform: scale(1.1); letter-spacing: 15px; }
                100% { opacity: 1; filter: blur(0px); transform: scale(1); letter-spacing: 6px; text-shadow: 0 0 15px rgba(197, 160, 89, 0.6); }
            }
            @keyframes shimmer {
                0% { background-position: -200% center; }
                100% { background-position: 200% center; }
            }
        </style>
    </head>
    <body>
    <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #002d35; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease-in-out;">
    <div style="position: relative; display: inline-block; text-align: center;">
        <h1 style="color: #c5a059; font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 4.5rem); margin: 0; font-weight: 700; background: linear-gradient(90deg, #c5a059 25%, #fff 50%, #c5a059 75%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: cinematicIntro 1.5s ease-out forwards, shimmer 2s linear infinite;">FLOOR HARMONY</h1>
        <div style="position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); height: 1px; background: #c5a059; width: 0; box-shadow: 0 0 15px #c5a059, 0 0 30px #fff; animation: Laserstrike 1s ease-out forwards; white-space: nowrap; overflow: visible;"></div>
    </div>
    </div>
    <div style="position: sticky; top: 0; z-index: 1000; background: #002d35; padding: 10px 0; border-bottom: 1px solid #c5a059;">
    <div id="menu-icon" style="position: absolute; right: 20px; top: 18px; cursor: pointer; z-index: 1001;">
    <div style="width: 25px; height: 2px; background-color: #c5a059; margin: 4px 0;"></div>
    <div style="width: 25px; height: 2px; background-color: #c5a059; margin: 4px 0;"></div>
    <div style="width: 25px; height: 2px; background-color: #c5a059; margin: 4px 0;"></div>
    </div>
    <h1 class="logo-text" style="text-align: center; margin: 0 auto; max-width: 900px; margin-top: 0; margin-bottom: 0;">
        <span class="gold-brand">FLOOR</span><span class="white-brand">HARMONY</span>
        </h1>
      <div class="vibrant-line" style="margin: 5px auto;"></div>
    <p style="text-align: center; margin: 0;">Streaming Quality Carpets.</p>
    <div id="nav-drawer" style="position: fixed; top: 0; right: -100%; width: 250px; height: 100%; background: #002d35; transition: 0.5s; z-index: 2000; box-shadow: -5px 0 15px rgba(0,0,0,0.5); padding-top: 60px; font-family: 'Cinzel', serif;">
    <div id="close-btn" style="position: absolute; top: 15px; right: 20px; color: #c5a059; font-size: 2rem; cursor: pointer; font-family: Arial, sans-serif;">&times</div>
    <a href="#" style="display: block; color: white; padding: 20px; text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid rgba(197, 160, 89, 0.3);">Gallery</a>
    <a href="#about" style="display: block; color: white; padding: 20px; text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid rgba(197, 160, 89, 0.3);">About Us</a>
    <a href="#services" style="display: block; color: white; padding: 20px; text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid rgba(197, 160, 89, 0.3);">Services</a>
    <a href="#contact" style="display: block; color: #c5a059; padding: 20px; text-decoration: none; font-size: 1.1rem; font-weight: bold;">Request Quote</a>
    </div>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr);gap: 20px; max-width: 1200px; margin: 40px auto; padding: 0 20px;">
    <div class="fade-in-box" style="border: 2px solid #c5a059; border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.5);">
    <video id="property_pro" autoplay muted loop playsinline style="width: 100%; height: 250px; object-fit: cover; object-position: center 20%; transform: scale(1.0); filter: grayscale(20%) brightness(95%); display: block;">
    <source src="property_pro.mp4" type="video/mp4">    
    </video>
    <div style="padding: 15px; text-align: center; background: #000; color: #c5a059; position: relative; z-index: 5; font-family: 'Cinzel', serif;">THE PROPERTY PRO</div>
    </div>
    <div class="fade-in-box" style="animation-delay: 0.5s; border: 2px solid #c5a059; border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.5);">
    <video autoplay muted loop playsinline style="width: 100%; height: 250px; object-fit: cover; display: block;">
    <source src="every_dayhome.mp4" type="video/mp4">
    </video>
    <div style="padding: 15px; text-align: center; background: #000; color: #c5a059; font-family:'Cinzel', serif;">THE EVERYDAY HOME</div>
    </div>
    <div class="fade-in-box" style="animation-delay: 1s; border: 2px solid #c5a059; border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.5);">
    <video autoplay muted loop playsinline style="width: 100%; height: 250px; object-fit: cover; display: block;">
    <source src="elite_comfort24.mp4" type="video/mp4">
    </video>
    <div style="padding: 15px; text-align: center; background: #000; color: #c5a059; font-family: 'Cinzel', serif;">THE ELITE COMFORT</div>
    </div>
    </div>
    <section id="contact" style="background: rgba(0,0,0,0.6); border: 2px solid #c5a059; border-radius: 20px; padding: 40px; max-width: 800px; margin: 40px auto; box-shadow: 0 0 20px rgba(255,215,0,0.1);">
    <h2 style="font-family: 'Cinzel', serif; color: #c5a059; text-align: center; font-size: 2rem; letter-spacing: 3px; margin-bottom: 30px;">Request A Free Quote</h2>
    <form action="https://formspree.io/f/maqleybw" method="POST" target="hidden_iframe" onsubmit="setTimeout(() => { window.location.href='https://emmanuel-valencia.github.io/floor-harmony/'; }, 1000);">
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
    <input type="text" name="name" placeholder="Your Name" style="width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid #c5a059; color: white; border-radius: 10px; font-size: 16px;" required>  
    <input type="email" name="email" placeholder="Your Email" style="width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid #c5a059; color: white; border-radius: 10px; font-size: 16px;" required>
    <label for="phone" style="display: block; color: #c5a059; font-family: 'Cinzel', serif; margin-bottom: 5px; text-align: left;">Phone Number</label>
    <input type="tel" id="phone" name="phone" placeholder="303-913-0327" style="width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid #c5a059; color: white; border-radius: 5px; box-sizing: border-box; display: block;" requiered>
    <select name="carpet_type" style="width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid #c5a059; color: #aaa; border-radius: 5px; box-sizing: border-box; display: block; appearance: none; -webkit-appearance: none;">
    <option value="" disabled selected hidden style="background: #333; color: #aaa; ">Select Your Carpet Choice</option><option value="property_pro" style="background: #333;">The Property Pro (Pro Grade) </option><option value="everyday_home" style="background: #333; ">The Everyday Home (Durability)</option><option value="elite_comfort" style="background: #333; ">The Elite Comfort (Premium)</option>
    <textarea name="message" placeholder="Tell us about your project..." rows="5" style="width: 100%; padding: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.05); border: 1px solid #c5a059; color: white; border-radius: 8px;"></textarea>
    <button type="submit" onmouseover="this.style.boxShadow= '0 0 20px #ffd700';" onmouseout="this.style.boxShadow= 'none';" style="background: #c5a059; color:black; padding: 18px; border:none; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; width: 100%;">SUBMIT REQUEST</button>
    </form>
    </section>
    <footer style="text-align: center; padding: 40px 20px; color: #c5a059; border-top: 1px solid rgba(197, 160, 89, 0.3); margin-top: 50px;">
    <p style="margin: 0; font-weight: bold; letter-spacing: 2px; font-family: 'Cinzel', serif;">FLOOR HARMONY</p>
    <p style="font-size: 0.9em; color: #aaa; margin: 10px 0;">Professional Installation * Serving Denver & Lakewood Metro</p>
    <p style="font-size: 0.8em; color: #666;">&copy; 2026 All Rights Reserved</p>
    <script> var video = document.getElementById("property_pro"); video.playbackRate = 0.5;
    const menuBtn = document.getElementById( 'menu-icon');
    const drawer = document.getElementById( 'nav-drawer');
    menuBtn.onclick = function() {
        if (drawer.style.right=== "0px") {
            drawer.style.right = "-100%";
        } else {
            drawer.style.right = "0px";
        }
    };
    const closeBtn = document.getElementById('close-btn');
    closeBtn.onclick = function() {
        drawer.style.right = "-100%";
    };
    // Splash Screen Timer
    window.addEventListener('load', function() {
        setTimeout(function() {
        const splash = document.getElementById('splash-screen');
        splash.style.opacity = '0';
        setTimeout(() => {
            splash.style.display = 'none';
    }, 800);  
    }, 1500);
    });
    </script>
    </footer>
    </div>
    </body>
    </html>
