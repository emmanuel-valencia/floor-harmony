<!DOCTYPE html>
<html>
    <head>
        <link href="https//fonts.googleapis.com/css2? family=Cinzel:wght@700&display=swap" rel="stylesheet">
        <title>Floor Harmony</title>
        <style>
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px);}
                to { opacity: 1; transform: translateY (0); }
            }
            .fade-in-box {
                opacity: 0;
                animation: fadeInUp 2.5s ease-out forwards;
            }
            
            @import url( 'https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
            body {
                background: linear-gradient(135deg, #002d35 0%, #004d5a 100%);
                color: white;
                font-family: 'Montserrat' sans-serif;
                margin: 0;
                text-align: center;
                min-height: 100dvh;
            }


            .logo-text {
                font-family: 'Cinzel' , serif !important;
                font-size: 3.5rem;
                letter-spacing: 25px;
                margin: 20px auto;
                text-transform: uppercase;
                display: block;
            }
            .gold-brand {
                color: #c5a059;
                font-weight: 900;
                padding-right: 10px;
                text-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
            }
            .white-brand{
                color: #ffffff;
                font-weight: 200;
                opacity: 0.95;
            }
            .vibrant-line {
                width: 750px;
                height: 3px;
                margin: 10px auto;
                background: linear-gradient(90deg, transparent, #c5a059, transparent);
                transition: width 0.8s cubic-bezier(0.2, 1, 0.3, 1);
                box-shadow: 0 0 15px rgba(197, 160, 89, 0.8);
                
            }
            .vibrant-line:hover {
                width: 750px;
                background: linear-gradient(90deg, transparent, #c5a059, #ffffff, #c5a059, transparent);
                box-shadow: 0px 0px 20px rgba(255, 0, 0, 0.6);
            }
        * { box-sizing: border-box; max-width: 100%;}
            p {
                font-size: 1rem;
                font-weight: 300;
                letter-spacing: 5px;
                color: #888;
                margin: 0;
                text-transform: uppercase;
            }
            input, textarea, select {
                font-size: 16px !important;
            }
        </style>
    </head>
