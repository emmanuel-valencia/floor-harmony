<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https//fonts.googleapis.com/css2? family=Cinzel:wght@700&display=swap" rel="stylesheet">
        <title>Floor Harmony</title>
        <style>
            body.skip-intro #splash-screen {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
            }
            #nav-drawer {
                position: fixed !important;
                top: 0 !important;
                right: -100% !important;
                width: 250px !important;
                height: 100% !important;
                background: #002229 !important;
                transition: 0.5s ease !important;
                z-index: 10000 !important;
            }
            #nav-drawer.open {
                right: 0 !important;
            }
            @media (max-width: 600px) {
                .main-logo {
                    height: 40px !important;
                    width: auto !important;
                }
                .logo-container p{
                    width: 100% !important;
                    text-align: center;
                    white-space: nowrap;
                }
                body{
                    overflow-x: hidden;
                    width: 100%;
                }
                .logo-text {
                    font-size: 5vw !important;
                    letter-spacing: 2px !important;
                    text-align: center;
                    width: 100%;
                    margin-right: 40px;                
                }
                .header-container {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    padding: 10px 15px;
                }
                .video-container {
                    display: flex !important;
                    flex-wrap: nowrap !important;
                    overflow-x: auto !important;
                    scroll-snap-type: x mandatory !important;
                    width: 100vw;
                    margin-left: calc(-50vw + 50%);
                    gap: 15px;
                    -webkit-overflow-scrolling: touch;
                    padding-bottom: 20px;             
                }
                .video-wrapper {
                    flex: 0 0 85vw !important;
                    scroll-snap-align: center;
                    text-align: center;
                }
                .video-box {
                    width: 100% !important;
                    height: 450px !important;
                    object-fit: cover !important;
                    border-radius: 20px;
                    border: 2px solid #c5a059
                }
                .video-label {
                    color: #c5a059;
                    font-family: 'Cinzel', serif;
                    margin-top: 10px;
                    font-size: 1.2rem;
                }
            }
                @media (min-width: 1024px) {
                .video-container {
                    display: flex !important;
                    flex-wrap: nowrap !important;
                    justify-content: center !important;
                    overflow: hidden !important;
                    width: 100% !important;
                    margin: 40px 0 !important;
                    gap: 20px !important;
                }
                .video-wrapper {
                    flex: 0 0 300px !important;
                    text-align: center;
                }
                .video-box {
                    width: 300px !important;
                    height: 300px !important;
                    object-fit: cover !important;
                    border-radius: 15px;
                    border: 2px solid #c5a059;    
                }
            }
           @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px);}
                to { opacity: 1; transform: translateY (0); }
            }
            .fade-in-box {
                opacity: 0;
                animation: fadeInUp 2.5s ease-out forwards;
            }
            
            @import url( 'https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
            body {
                background: linear-gradient(135deg, #1a1a1a 0%, #004d5a 100%);
                color: white;
                font-family: 'Montserrat' sans-serif;
                margin: 0;
                text-align: center;
                min-height: 100dvh;
            }


            .logo-text {
                font-family: 'Cinzel' , serif !important;
                font-size: 3.5rem;
                letter-spacing: 25px;
                margin: 20px auto;
                text-transform: uppercase;
                display: block;
            }
            .gold-brand {
                color: #c5a059;
                font-weight: 900;
                padding-right: 10px;
                text-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
            }
            .white-brand{
                color: #ffffff;
                font-weight: 200;
                opacity: 0.95;
            }
            .vibrant-line {
                width: 750px;
                height: 3px;
                margin: 10px auto;
                background: linear-gradient(90deg, transparent, #c5a059, transparent);
                transition: width 0.8s cubic-bezier(0.2, 1, 0.3, 1);
                box-shadow: 0 0 15px rgba(197, 160, 89, 0.8);
                
            }
            .vibrant-line:hover {
                width: 750px;
                background: linear-gradient(90deg, transparent, #c5a059, #ffffff, #c5a059, transparent);
                box-shadow: 0px 0px 20px rgba(255, 0, 0, 0.6);
            }
        * { box-sizing: border-box; max-width: 100%;}
            p {
                font-size: 1rem;
                font-weight: 300;
                letter-spacing: 5px;
                color: #888;
                margin: 0;
                text-transform: uppercase;
            }
            input, textarea, select {
                font-size: 16px !important;
            }
             @keyframes LaserStrike {
                0% { width: 0; opacity: 0; }
                20% { opacity: 1; }
                100% { width: 100%; opacity: 1; }
             }
             @keyframes cinematicIntro {
                0% { opacity: 0; filter: blur(15px); transform: scale(1.1); letter-spacing: 15px; }
                100% { opacity: 1; filter: blur(0px); transform: scale(1); letter-spacing: 6px; text-shadow: 0 0 15px rgba(197, 160, 89, 0.6); }
            }
            @keyframes shimmer {
                0% { transform: translateX(-100%); }
                100% { transform: translateX(100%); }
            }
            /*styling the main logo*/
            .main-logo {
                height: 75px !important;
                width: auto !important;
                display: block !important;
                margin: 0 auto !important;
                will-change: filter;
                filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.8));
            }
        </style>
    </head>
    <body>
    <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #002229; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 1s ease;">
    <div style="text-align: center; width: 100%; max-width: 600px; padding: 20px;">
    <img src="floorharmony_braided_logo.png" alt="Floor Harmony Logo" style="width: 80%; max-width: 300px; height: auto; display: block; margin: 0 auto;">
    <div style="height: 3px; background: linear-gradient(90deg, transparent, #c5a059, transparent); width: 100%; margin: 15px auto 0 auto; animation: shimmer 2s infinite;"></div>
    </div>
    </div>
    <div style="position: sticky; top: 0; z-index: 1000; background: #002229; padding: 5px 0;">
    <div id="menu-icon" style="position: absolute; right: 20px; top: 18px; cursor: pointer; z-index: 1001;">
    <div style="width: 25px; height: 2px; background-color: #c5a059; margin: 4px 0;"></div>
    <div style="width: 25px; height: 2px; background-color: #c5a059; margin: 4px 0;"></div>
    <div style="width: 25px; height: 2px; background-color: #c5a059; margin: 4px 0;"></div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 350px; margin: 0 auto; padding: 5px 0; background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);">
        <img src="floorharmony_braided_logo.png" alt="Floor Harmony Logo" class="main-logo;">
        <div class="vibrant-line" style="margin: 5px auto; width: 80%; height: 2px;"></div>
    <p style="text-align: center; margin: 5px 0; color: #fff; letter-spacing: 2px; font-size: 0.9rem;">Streaming Quality Carpets.</p>
    </div>
    <div id="nav-drawer" style="position: fixed; top: 0; right: -100%; width: 250px; height: 100%; background: #002229; transition: 0.5s; z-index: 2000; box-shadow: -5px 0 15px rgba(0,0,0,0.5); padding-top: 60px; font-family: 'Cinzel', serif;">
    <div id="close-btn" style="position: absolute; top: 15px; right: 20px; color: #c5a059; font-size: 2rem; cursor: pointer; font-family: Arial, sans-serif;">&times</div>
    <a href="gallery.html" style="display: block; padding: 15px; color: #c5a059; font-family: Arial, sans-serif; border-bottom: 1px solid rgba(197, 160, 89, 0.3);">Gallery</a>
    <a href="about.html" style="display: block; padding: 15px; color: #c5a059; text-decoration: none; font-family: 'Playfair Display', serif; border-bottom: 1px solid rgba(197, 160, 89, 0.3);">About Us</a>
    <a href="#services" style="display: block; color: white; padding: 20px; text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid rgba(197, 160, 89, 0.3);">Services</a>
    <a href="#contact" style="display: block; color: #c5a059; padding: 20px; text-decoration: none; font-size: 1.1rem; font-weight: bold;">Request Quote</a>
    </div>
    <div class="video-container">
    <div class="video-wrapper">
        <video autoplay muted loop playsinline class="video-box" id="property_pro">
                <source src="property_pro.mp4" type="video/mp4"></video>
            <p class="video-label">The Property Pro</p>
    </div>
    <div class="video-wrapper">
        <video autoplay muted loop playsinline class="video-box">
                <source src="every_dayhome.mp4" type="video/mp4"></video>
            <p class="video-label">Every Day Home</p>
    </div>
    <div class="video-wrapper">
        <video autoplay muted loop playsinline class="video-box">
                <source src="elite_comfort24.mp4" type="video/mp4"></video>
            <p class="video-label">Elite Comfort</p>
    </div>
    </div>
    <section id="contact" style="background: rgba(0,0,0,0.6); border: 2px solid #c5a059; border-radius: 20px; padding: 40px; max-width: 800px; margin: 40px auto; box-shadow: 0 0 20px rgba(255,215,0,0.1);">
    <h2 style="font-family: 'Cinzel', serif; color: #c5a059; text-align: center; font-size: 2rem; letter-spacing: 3px; margin-bottom: 30px;">Request A Free Quote</h2>
    <form action="https://formspree.io/f/maqleybw" method="POST" target="hidden_iframe" onsubmit="setTimeout(() => { window.location.href='https://emmanuel-valencia.github.io/floor-harmony/'; }, 1000);">
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
    <input type="text" name="name" placeholder="Your Name" style="width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid #c5a059; color: white; border-radius: 10px; font-size: 16px;" required>  
    <input type="email" name="email" placeholder="Your Email" style="width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid #c5a059; color: white; border-radius: 10px; font-size: 16px;" required>
    <label for="phone" style="display: block; color: #c5a059; font-family: 'Cinzel', serif; margin-bottom: 5px; text-align: left;">Phone Number</label>
    <input type="tel" id="phone" name="phone" placeholder="303-913-0327" style="width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid #c5a059; color: white; border-radius: 5px; box-sizing: border-box; display: block;" requiered>
    <select name="carpet_type" style="width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid #c5a059; color: #aaa; border-radius: 5px; box-sizing: border-box; display: block; appearance: none; -webkit-appearance: none;">
    <option value="" disabled selected hidden style="background: #333; color: #aaa; ">Select Your Carpet Choice</option><option value="property_pro" style="background: #333;">The Property Pro (Pro Grade) </option><option value="everyday_home" style="background: #333; ">The Everyday Home (Durability)</option><option value="elite_comfort" style="background: #333; ">The Elite Comfort (Premium)</option>
    <textarea name="message" placeholder="Tell us about your project..." rows="5" style="width: 100%; padding: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.05); border: 1px solid #c5a059; color: white; border-radius: 8px;"></textarea>
    <button type="submit" onmouseover="this.style.boxShadow= '0 0 20px #ffd700';" onmouseout="this.style.boxShadow= 'none';" style="background: #c5a059; color:black; padding: 18px; border:none; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; width: 100%;">SUBMIT REQUEST</button>
    </form>
    </section>
    <footer style="text-align: center; padding: 40px 20px; color: #c5a059; border-top: 1px solid rgba(197, 160, 89, 0.3); margin-top: 50px;">
    <p style="margin: 0; font-weight: bold; letter-spacing: 2px; font-family: 'Cinzel', serif;">FLOOR HARMONY</p>
    <p style="font-size: 0.9em; color: #aaa; margin: 10px 0;">Professional Installation * Serving Denver & Lakewood Metro</p>
    <p style="font-size: 0.8em; color: #666;">&copy; 2026 All Rights Reserved</p>
    
    <script> 
    if (sessionStorage.getItem( 'curtainShown' )) { 
        document.documentElement.classList.add( 'skip-intro'); }
    window.addEventListener('load', function() {
    const curtain = document.getElementById('splash-screen');
    if (sessionStorage.getItem( 'curtainShown ')) {
        curtain.style.display = 'none';
        return; 
    }
        setTimeout(() => {
            curtain.style.opacity ='0';
        setTimeout(() => { 
            curtain.style.display = 'none';
        }, 600);
        sessionStorage.setItem( 'curtainShown', 'true' );
        }, 300);
    });

    var video = document.getElementById("property_pro");
    if (video) {video.playbackRate = 0.5;}

    const menuBtn = document.getElementById( 'menu-icon');
    const drawer = document.getElementById( 'nav-drawer');
    const closeBtn = document.getElementById( 'close-btn');
    if (menuBtn && drawer) {
        menuBtn.onclick = function() {
            drawer.classList.add('open');
        };
    }
    if (closeBtn && drawer) {
        closeBtn.onclick = function() {
            drawer.classList.remove( 'open');
        };
    }
    </script>
    </footer>
    </div>
    </body>
    </html>
